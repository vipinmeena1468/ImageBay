<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <title>ImageBay</title>
    <style>
      * {
        box-sizing: border-box;
      }

      body {
        margin: 0;
        padding: 0;
        font-family: system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI",
          sans-serif;
        font-size: 12px;
        color: #111827;
        background: #ffffff;
      }

      .app {
        height: 100vh;
        max-height: 640px;
        display: flex;
        flex-direction: column;
        background: #ffffff;
      }

      /* ── Top bar ────────────────────────────────────────── */

      .top-bar {
        position: fixed;
        top: 0;
        left: 0;
        right: 0;
        padding: 8px 14px;
        border-bottom: 1px solid #e5e7eb;
        display: flex;
        align-items: center;
        justify-content: space-between;
        background: #ffffff;
        z-index: 60;
      }

      .top-left {
        display: flex;
        flex-direction: column;
        gap: 2px;
      }

      .title {
        font-size: 13px;
        font-weight: 600;
      }

      .count {
        font-size: 11px;
        color: #6b7280;
      }

      .top-right {
        position: relative;
        display: inline-flex;
        align-items: center;
        justify-content: flex-end;
      }

      /* ── Filter button ──────────────────────────────────── */

      .filter-button {
        display: inline-flex;
        align-items: center;
        gap: 4px;
        padding: 4px 8px;
        font-size: 10px;
        border-radius: 2px;
        border: 1px solid #d1d5db;
        background: #f9fafb;
        cursor: pointer;
        user-select: none;
        width: 110px;
        justify-content: space-between;
        transition: background 0.15s ease, border-color 0.15s ease;
      }

      .filter-button:hover {
        background: #f3f4f6;
        border-color: #cbd5e1;
      }

      .filter-button-label {
        flex: 1;
        line-height: 1;
        text-align: left;
        white-space: nowrap;
        overflow: hidden;
        text-overflow: ellipsis;
      }

      .filter-button-caret {
        font-size: 9px;
        line-height: 1;
        color: #4b5563;
        flex-shrink: 0;
      }

      /* ── Filter menu ────────────────────────────────────── */

      .filter-menu {
        position: absolute;
        top: calc(100% + 4px);
        right: 0;
        min-width: 110px;
        max-height: 280px;
        overflow-y: auto;
        background: #111827;
        color: #f9fafb;
        border-radius: 2px;
        box-shadow: 0 10px 30px rgba(15, 23, 42, 0.4);
        z-index: 100;
        display: none;
      }

      .filter-menu-item {
        padding: 6px 10px;
        font-size: 10px;
        cursor: pointer;
        white-space: nowrap;
      }

      .filter-menu-item:hover {
        background: #1f2937;
      }

      .filter-menu-item.active {
        background: #2563eb;
      }

      .filter-menu-divider {
        height: 1px;
        background: #1f2937;
        margin: 2px 0;
      }

      /* ── Content + grid ─────────────────────────────────── */

      .content {
        flex: 1;
        display: flex;
        flex-direction: column;
        background: #f3f4f6;
        margin-top: 48px;
        margin-bottom: 26px;
      }

      .grid-scroll {
        flex: 1;
        overflow: auto;
        padding: 12px 14px 40px;
      }

      .grid {
        display: grid;
        grid-template-columns: repeat(2, 1fr);
        gap: 8px;
      }

      /* ── Thumbnail tile ─────────────────────────────────── */

      .thumb {
        position: relative;
        background: #e5e7eb;
        cursor: pointer;
        overflow: hidden;
        aspect-ratio: 4 / 3;
        border-radius: 2px;
      }

      .thumb img {
        display: block;
        width: 100%;
        height: 100%;
        object-fit: cover;
        transition: opacity 0.2s ease;
      }

      /* Hover darkening via pseudo-element */
      .thumb::after {
        content: "";
        position: absolute;
        inset: 0;
        background: rgba(15, 23, 42, 0);
        transition: background 0.15s ease-out;
        pointer-events: none;
      }

      .thumb:hover::after {
        background: rgba(15, 23, 42, 0.06);
      }

      /* ── Insert state overlay ───────────────────────────── */

      .thumb-overlay {
        position: absolute;
        inset: 0;
        display: flex;
        align-items: center;
        justify-content: center;
        opacity: 0;
        pointer-events: none;
        transition: opacity 0.15s ease;
        z-index: 2;
      }

      .thumb.inserting .thumb-overlay {
        opacity: 1;
        background: rgba(15, 23, 42, 0.5);
      }

      .thumb.insert-success .thumb-overlay {
        opacity: 1;
        background: rgba(0, 160, 60, 0.45);
      }

      .thumb.insert-error .thumb-overlay {
        opacity: 1;
        background: rgba(200, 20, 50, 0.45);
      }

      .thumb-spinner {
        width: 18px;
        height: 18px;
        border-radius: 50%;
        border: 2px solid rgba(255, 255, 255, 0.35);
        border-top-color: #ffffff;
        animation: spin 0.6s linear infinite;
        display: none;
      }

      .thumb.inserting .thumb-spinner {
        display: block;
      }

      .thumb-status {
        font-size: 16px;
        color: #ffffff;
        line-height: 1;
        display: none;
      }

      .thumb.insert-success .thumb-status,
      .thumb.insert-error .thumb-status {
        display: block;
      }

      /* ── Empty / loading states ─────────────────────────── */

      .empty-state {
        flex: 1;
        display: flex;
        align-items: center;
        justify-content: center;
        padding: 16px;
        font-size: 12px;
        color: #9ca3af;
        text-align: center;
      }

      .shimmer-grid {
        display: grid;
        grid-template-columns: repeat(2, 1fr);
        gap: 8px;
        width: 100%;
      }

      .shimmer-tile {
        aspect-ratio: 4 / 3;
        border-radius: 2px;
        background: linear-gradient(
          90deg,
          #e5e7eb 0%,
          #f3f4f6 50%,
          #e5e7eb 100%
        );
        background-size: 200% 100%;
        animation: shimmer 1s linear infinite;
      }

      /* ── Footer ─────────────────────────────────────────── */

      .footer {
        position: fixed;
        bottom: 0;
        left: 0;
        right: 0;
        padding: 6px 14px 7px;
        border-top: 1px solid #e5e7eb;
        font-size: 10px;
        color: #9ca3af;
        text-align: right;
        background: #ffffff;
        z-index: 50;
      }

      /* ── Animations ─────────────────────────────────────── */

      @keyframes spin {
        to {
          transform: rotate(360deg);
        }
      }

      @keyframes shimmer {
        0% {
          background-position: 0% 0;
        }
        100% {
          background-position: 200% 0;
        }
      }
    </style>
  </head>
  <body>
    <div class="app">
      <div class="top-bar">
        <div class="top-left">
          <div class="title">ImageBay</div>
          <div id="countLabel" class="count"></div>
        </div>
        <div class="top-right">
          <button id="filterButton" class="filter-button" type="button">
            <span id="filterButtonLabel" class="filter-button-label"></span>
            <span class="filter-button-caret">▾</span>
          </button>
          <div id="filterMenu" class="filter-menu"></div>
        </div>
      </div>

      <div class="content">
        <div id="gridScroll" class="grid-scroll">
          <div id="emptyState" class="empty-state">
            <span>Loading…</span>
          </div>
          <div id="grid" class="grid" style="display: none"></div>
        </div>
      </div>

      <div class="footer">made by Vipin Meena</div>
    </div>

    <script>
      const INDEX_URL =
        "https://raw.githubusercontent.com/vipinmeena1468/library-assets/main/index.json";

      const IMAGE_BASE_URL =
        "https://raw.githubusercontent.com/vipinmeena1468/library-assets/main/";

      const ALL_CATEGORY_ID = "__all__";

      // ── State ─────────────────────────────────────────────

      let indexData = null;
      let activeCategoryId = null;
      let menuOpen = false;
      let thumbObserver = null;
      let activeTile = null; // the tile currently being inserted

      // ── DOM refs ──────────────────────────────────────────

      const countLabelEl = document.getElementById("countLabel");
      const emptyStateEl = document.getElementById("emptyState");
      const gridEl = document.getElementById("grid");
      const gridScrollEl = document.getElementById("gridScroll");
      const filterButton = document.getElementById("filterButton");
      const filterButtonLabel = document.getElementById("filterButtonLabel");
      const filterMenu = document.getElementById("filterMenu");

      // ── Loading shimmer ───────────────────────────────────

      function showShimmer() {
        const tiles = Array.from({ length: 12 })
          .map(() => '<div class="shimmer-tile"></div>')
          .join("");
        emptyStateEl.innerHTML = '<div class="shimmer-grid">' + tiles + "</div>";
        emptyStateEl.style.display = "block";
        gridEl.style.display = "none";
      }

      function hideShimmer() {
        emptyStateEl.style.display = "none";
      }

      // ── Index fetch ───────────────────────────────────────

      async function fetchIndex() {
        showShimmer();
        try {
          const res = await fetch(INDEX_URL);
          if (!res.ok) throw new Error("HTTP " + res.status);
          indexData = await res.json();
          buildFilterMenu();

          const firstCat =
            indexData?.categories?.length > 0
              ? indexData.categories[0].id
              : null;

          if (firstCat) {
            setCategory(ALL_CATEGORY_ID);
          } else {
            showError("No categories found.");
          }
        } catch (err) {
          console.error(err);
          showError("Could not load images. Check your connection.");
        }
      }

      function showError(msg) {
        emptyStateEl.style.display = "flex";
        emptyStateEl.innerHTML = msg;
        gridEl.style.display = "none";
      }

      // ── Filter menu ───────────────────────────────────────

      function buildFilterMenu() {
        filterMenu.innerHTML = "";
        if (!indexData?.categories) return;

        // "All" entry at the top
        const totalImages = indexData.categories.reduce(
          (sum, cat) => sum + (cat.images?.length ?? 0),
          0
        );
        const allItem = document.createElement("div");
        allItem.className = "filter-menu-item";
        allItem.dataset.id = ALL_CATEGORY_ID;
        allItem.textContent = `All (${totalImages})`;
        allItem.addEventListener("click", () => {
          setCategory(ALL_CATEGORY_ID);
          closeMenu();
        });
        filterMenu.appendChild(allItem);

        // Divider
        const divider = document.createElement("div");
        divider.className = "filter-menu-divider";
        filterMenu.appendChild(divider);

        // Individual categories
        indexData.categories.forEach((cat) => {
          const item = document.createElement("div");
          item.className = "filter-menu-item";
          item.dataset.id = cat.id;
          item.textContent = cat.name || cat.id;
          item.addEventListener("click", () => {
            setCategory(cat.id);
            closeMenu();
          });
          filterMenu.appendChild(item);
        });

        updateMenuActiveState();
      }

      function setCategory(id) {
        activeCategoryId = id;

        if (id === ALL_CATEGORY_ID) {
          filterButtonLabel.textContent = "All";
        } else {
          filterButtonLabel.textContent = getCategoryName(id);
        }

        updateMenuActiveState();
        updateCountLabel();
        renderGrid();
      }

      function getCategoryName(id) {
        if (!indexData?.categories) return id;
        const cat = indexData.categories.find((c) => c.id === id);
        return (cat && (cat.name || cat.id)) || id;
      }

      function updateMenuActiveState() {
        filterMenu.querySelectorAll(".filter-menu-item").forEach((item) => {
          item.classList.toggle("active", item.dataset.id === activeCategoryId);
        });
      }

      function updateCountLabel() {
        const images = getImagesForActiveCategory();
        countLabelEl.textContent = images.length + " images";
      }

      // ── Image data helpers ────────────────────────────────

      function getImagesForActiveCategory() {
        if (!indexData?.categories) return [];

        if (activeCategoryId === ALL_CATEGORY_ID) {
          const all = indexData.categories.flatMap((cat) =>
            (cat.images ?? []).map((img) => ({
              categoryId: cat.id,
              path: img.path,
              thumbnailPath: img.thumbnailPath,
              fileName: img.fileName,
            }))
          );
          // Fisher-Yates shuffle — randomised on every plugin open
          for (let i = all.length - 1; i > 0; i--) {
            const j = Math.floor(Math.random() * (i + 1));
            [all[i], all[j]] = [all[j], all[i]];
          }
          return all;
        }

        const cat = indexData.categories.find(
          (c) => c.id === activeCategoryId
        );
        if (!cat?.images) return [];

        return cat.images.map((img) => ({
          categoryId: cat.id,
          path: img.path,
          thumbnailPath: img.thumbnailPath,
          fileName: img.fileName,
        }));
      }

      // ── Intersection Observer for lazy loading ────────────

      function ensureThumbObserver() {
        if (thumbObserver || typeof IntersectionObserver === "undefined") return;

        thumbObserver = new IntersectionObserver(
          (entries) => {
            entries.forEach((entry) => {
              if (!entry.isIntersecting) return;
              const img = entry.target;
              const src = img.dataset.src;
              if (!src) return;
              img.src = src;
              thumbObserver.unobserve(img);
            });
          },
          {
            root: gridScrollEl,
            rootMargin: "300px 0px",
            threshold: 0,
          }
        );
      }

      // ── Grid render ───────────────────────────────────────

      function renderGrid() {
        // Disconnect observer so we don't leak observations from previous render
        if (thumbObserver) {
          thumbObserver.disconnect();
          thumbObserver = null;
        }

        const items = getImagesForActiveCategory();
        gridEl.innerHTML = "";

        if (!items.length) {
          showError("No images in this category.");
          return;
        }

        hideShimmer();
        gridEl.style.display = "grid";
        ensureThumbObserver();

        items.forEach((img) => {
          // Full-res URL used for insert; thumbnail URL used for display
          const fullUrl = IMAGE_BASE_URL + encodeURI(img.path);
          const thumbUrl = img.thumbnailPath
            ? IMAGE_BASE_URL + encodeURI(img.thumbnailPath)
            : fullUrl; // fallback to full-res if thumbnails not yet generated

          const cell = document.createElement("div");
          cell.className = "thumb";

          // Overlay for insert state feedback
          const overlay = document.createElement("div");
          overlay.className = "thumb-overlay";

          const spinner = document.createElement("div");
          spinner.className = "thumb-spinner";

          const statusIcon = document.createElement("div");
          statusIcon.className = "thumb-status";

          overlay.appendChild(spinner);
          overlay.appendChild(statusIcon);
          cell.appendChild(overlay);

          // Image element with lazy loading
          const imageEl = document.createElement("img");
          imageEl.loading = "lazy";
          imageEl.alt = img.fileName || "";
          imageEl.dataset.src = thumbUrl;

          if (thumbObserver) {
            thumbObserver.observe(imageEl);
          } else {
            imageEl.src = thumbUrl;
          }

          cell.appendChild(imageEl);

          cell.addEventListener("click", () => {
            // Prevent double-click while another insert is in progress
            if (activeTile) return;
            insertImage(cell, fullUrl, statusIcon);
          });

          gridEl.appendChild(cell);
        });

        gridScrollEl.scrollTop = 0;
      }

      // ── Insert logic ──────────────────────────────────────

      function insertImage(tile, url, statusIcon) {
        activeTile = tile;
        tile.classList.add("inserting");

        parent.postMessage(
          { pluginMessage: { type: "insert-image", url } },
          "*"
        );
      }

      function clearTileState(tile) {
        tile.classList.remove("inserting", "insert-success", "insert-error");
        activeTile = null;
      }

      // ── Messages from code.js ─────────────────────────────

      window.onmessage = (event) => {
        const msg = event.data?.pluginMessage;
        if (!msg || !activeTile) return;

        const tile = activeTile;
        const statusIcon = tile.querySelector(".thumb-status");

        if (msg.type === "insert-complete") {
          tile.classList.remove("inserting");
          tile.classList.add("insert-success");
          if (statusIcon) statusIcon.textContent = "✓";
          setTimeout(() => clearTileState(tile), 900);
        }

        if (msg.type === "insert-error") {
          tile.classList.remove("inserting");
          tile.classList.add("insert-error");
          if (statusIcon) statusIcon.textContent = "✕";
          setTimeout(() => clearTileState(tile), 1500);
        }
      };

      // ── Menu open/close ───────────────────────────────────

      function openMenu() {
        filterMenu.style.display = "block";
        menuOpen = true;
      }

      function closeMenu() {
        filterMenu.style.display = "none";
        menuOpen = false;
      }

      filterButton.addEventListener("click", (e) => {
        e.stopPropagation();
        menuOpen ? closeMenu() : openMenu();
      });

      document.addEventListener("click", () => {
        if (menuOpen) closeMenu();
      });

      document.addEventListener("keydown", (e) => {
        if (e.key === "Escape" && menuOpen) closeMenu();
      });

      // ── Boot ──────────────────────────────────────────────

      fetchIndex();
    </script>
  </body>
</html>
